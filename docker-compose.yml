x-logging:
  &default-logging
  logging:
    driver: json-file
    options:
      max-size: 100M

services:
  server:
    image: judge0/judge0:1.13.1
    #image: judge0/judge0:latest
    container_name: judge0-server
    volumes:
      - ./judge0.conf:/judge0.conf:ro
      - /home/infyshine/judge0/box:/box
    ports:
      - "2358:2358"
    privileged: true
    restart: always
    <<: *default-logging

  workers:
    image: judge0/judge0:1.13.1
    #image: judge0/judge0:latest
    container_name: judge0-workers
    command: ["./scripts/workers"]
    volumes:
      - ./judge0.conf:/judge0.conf:ro
      - /home/infyshine/judge0/box:/box
    privileged: true
    restart: always
    <<: *default-logging

  db:
    image: postgres:16.2
    container_name: judge0-db
    env_file: judge0.conf
    volumes:
      - /home/infyshine/judge0/postgres-data:/var/lib/postgresql/data
    restart: always
    <<: *default-logging

  redis:
    image: redis:7.2.4
    container_name: judge0-redis
    command:
      [
        "bash",
        "-c",
        'docker-entrypoint.sh --appendonly no --requirepass "$$REDIS_PASSWORD"'
      ]
    env_file: judge0.conf
    volumes:
      - /home/infyshine/judge0/redis-data:/data
    restart: always
    <<: *default-logging

volumes:
  data:
